output_dir: skill4econ/runs
run_spxtregress: true
run_ppmlhdfe: true
cert_units: 12
cert_years: 4
spxtregress_panel_effect: fe
spxtregress_iterate: 80
spxtregress_timeout: 180
spatial_models: [SAR, SEM, SDM]
w_grid:
  - name: W_row
    options: normalize(row)
  - name: W_minmax
    options: normalize(minmax)
  - name: W_trunc_row
    options: vtruncate(0.25) normalize(row)
