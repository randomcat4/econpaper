# Quarterly Journal of Economics Venue Profile

name: quarterly-journal-of-economics
description: >
  Venue profile for Quarterly Journal of Economics style economics manuscripts.
  Captures abstract, manuscript ordering, and required-section constraints for
  econ paper generation.
version: "1.0.0"
tags:
  - venue
  - qje
  - economics
type: venue_profile
target_sections:
  - "*"
priority: 15

system_prompt_append: |
  ## Quarterly Journal of Economics Guidelines
  - Use an economics manuscript structure with Introduction, Data, Empirical Strategy, Results, Robustness, and Conclusion.
  - Keep the abstract within 250 words.
  - Preserve total word count and manuscript order metadata when assembling outputs.
  - Avoid AI/ML benchmark-style sections unless the manuscript explicitly requires them.

venue_config:
  name: quarterly-journal-of-economics
  field: economics
  abstract_limit: 250
  page_limit: null
  require_total_word_count: true
  required_sections:
    - "Introduction"
    - "Data"
    - "Empirical Strategy"
    - "Results"
    - "Robustness"
    - "Conclusion"
  manuscript_order:
    - "title_page_with_abstract"
    - "text"
    - "affiliations"
    - "appendix"
    - "references"
    - "notes"
    - "tables"
    - "figures"
