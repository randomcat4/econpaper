# American Economic Review Venue Profile

name: american-economic-review
description: >
  Venue profile for American Economic Review style economics manuscripts.
  Captures page, abstract, and required-section constraints for econ paper
  generation.
version: "1.0.0"
tags:
  - venue
  - aer
  - economics
type: venue_profile
target_sections:
  - "*"
priority: 15

system_prompt_append: |
  ## American Economic Review Guidelines
  - Use an economics manuscript structure with Introduction, Data, Empirical Strategy, Results, Robustness, and Conclusion.
  - Keep the abstract within 100 words.
  - Follow a 40-page target at 11pt with 1.5 spacing and 1-inch margins, including figures, tables, references, and appendix.
  - Avoid AI/ML benchmark-style sections unless the manuscript explicitly requires them.

venue_config:
  name: american-economic-review
  field: economics
  abstract_limit: 100
  page_limit: 40
  page_limit_alt_12pt: 45
  words_per_page: 600
  intro_display_heading: false
  required_sections:
    - "Introduction"
    - "Data"
    - "Empirical Strategy"
    - "Results"
    - "Robustness"
    - "Conclusion"
  notes:
    - "40 pages at 11pt, 1.5 spacing, 1-inch margins, including figures/tables/references/appendix."
    - "45 pages allowed at 12pt under equivalent format."
